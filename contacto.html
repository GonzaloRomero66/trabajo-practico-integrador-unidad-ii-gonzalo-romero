<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
  </head>
  <body>
    <h1>Contactos</h1>
    <div class="row g-3">
      <div class="col">
        <label for="inputEmail4" class="form-label">Primer Nombre</label>
        <input
          type="text"
          class="form-control"
          placeholder="Nombre"
          aria-label="Nombre"
        />
      </div>
      <div class="col">
        <label for="inputEmail4" class="form-label">Apellido</label>
        <input
          type="text"
          class="form-control"
          placeholder="Apellido"
          aria-label="Apellido"
        />
      </div>
      <div class="col">
        <label for="inputEmail4" class="form-label">Telefono</label>
        <input
          type="text"
          class="form-control"
          placeholder="Telefono"
          aria-label="Telefono"
        />
      </div>
    </div>
    <form class="row g-3">
      <div class="col-md-6">
        <label for="inputEmail4" class="form-label">Email</label>
        <input type="email" class="form-control" id="inputEmail4" />
      </div>
      <div class="col-md-6">
        <label for="inputPassword4" class="form-label">Contraseña</label>
        <input type="password" class="form-control" id="inputPassword4" />
      </div>
      <div class="col-12">
        <label for="inputAddress" class="form-label">Direccion</label>
        <input
          type="text"
          class="form-control"
          id="inputAddress"
          placeholder="Barrio...."
        />
      </div>
      <div class="col-12">
        <label for="inputAddress2" class="form-label">Segunda Direccion</label>
        <input
          type="text"
          class="form-control"
          id="inputAddress2"
          placeholder="Casa, apartamento...."
        />
      </div>
      <div class="col-md-6">
        <label for="inputCity" class="form-label">Ciudad</label>
        <input type="text" class="form-control" id="inputCity" />
      </div>
      <div class="col-md-4">
        <label for="inputState" class="form-label">Tipo de consulta</label>
        <select id="inputState" class="form-select">
          <option selected>Seleccione una opción</option>
          <option>Información de carreras</option>
          <option>Inscripciones</option>
          <option>Horarios</option>
          <option>Certificados / documentación</option>
          <option>Otro</option>
        </select>
      </div>
      <div class="col-12">
        <label class="form-label">Mensaje</label>
        <textarea
          class="form-control"
          rows="4"
          placeholder="Escriba su consulta..."
        ></textarea>
      </div>
      <div class="col-12">
        <div class="form-check">
          <input class="form-check-input" type="checkbox" id="gridCheck" />
          <label class="form-check-label" for="gridCheck">
            Acepto los términos y condiciones y que me contacten por este medio
          </label>
        </div>
      </div>
      <div class="col-12">
        <button type="submit" class="btn btn-primary">Enviar consulta</button>
      </div>
    </form>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
